<!DOCTYPE html>
<html>
<head>
    <title>Create Assignment</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
        }

        .container {
            width: 500px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            margin-top: 20px;
            padding: 10px;
            background: #2f3e46;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Create Assignment</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Create</button>
    </form>
</div>

</body>
</html>
